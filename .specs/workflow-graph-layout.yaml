# SpecForge workflow graph layout
# Edit x/y coordinates to reposition cards in the workflow graph.
# Card dimensions used by the renderer: desktop 240x118, mobile 206x118.
# Connection anchors use T1..T5, R1..R5, B1..B5, L1..L5.
horizontal:
  capture:
    x: 80
    y: 60
  refinement:
    x: 380
    y: 100
  spec:
    x: 580
    y: 280
  technical-design:
    x: 880
    y: 320
  implementation:
    x: 1080
    y: 500
  review:
    x: 1080
    y: 680
  release-approval:
    x: 1280
    y: 860
  pr-preparation:
    x: 1580
    y: 900
  completed:
    x: 1880
    y: 1080
  legend:
    x: 20
    y: 300
  connections:
    capture->refinement:
      from: R3
      to: L3
    refinement->spec:
      from: B3
      to: L3
    spec->technical-design:
      from: R3
      to: L3
    technical-design->implementation:
      from: B3
      to: L3
    implementation->review:
      from: B3
      to: T3
    review->release-approval:
      from: B3
      to: L3
    release-approval->pr-preparation:
      from: R3
      to: L3
    pr-preparation->completed:
      from: B3
      to: L3
  loops:
    implementation-review:
      fromPhaseId: implementation
      toPhaseId: review
      side: right

vertical:
  capture:
    x: 80
    y: 60
  refinement:
    x: 380
    y: 100
  spec:
    x: 430
    y: 280
  technical-design:
    x: 430
    y: 460
  implementation:
    x: 80
    y: 640
  review:
    x: 80
    y: 820
  release-approval:
    x: 230
    y: 1000
  pr-preparation:
    x: 380
    y: 1180
  completed:
    x: 230
    y: 1360
  legend:
    x: 20
    y: 300
  connections:
    capture->refinement:
      from: R3
      to: L3
    refinement->spec:
      from: B3
      to: T3
    spec->technical-design:
      from: B3
      to: T3
    technical-design->implementation:
      from: B3
      to: R3
    implementation->review:
      from: B3
      to: T3
    review->release-approval:
      from: B3
      to: L3
    release-approval->pr-preparation:
      from: B3
      to: L3
    pr-preparation->completed:
      from: B3
      to: R3
  loops:
    implementation-review:
      fromPhaseId: implementation
      toPhaseId: review
      side: right
